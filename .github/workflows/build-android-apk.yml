name: Build Android APK (MasterDnsPro)

# ==============================================================================
# MasterDnsPro Android APK Builder
# ------------------------------------------------------------------------------
# This workflow builds a graphical Android APK named "MasterDnsPro" by
# pulling a companion Android app repository that consumes the Go core
# (this repo) as a submodule. The APK exposes ALL 26 protocol-improvement
# steps that ship in the desktop/Termux clients, because the Android repo's
# `third_party/<core>` submodule points at THIS webapp repo (NOT at upstream
# WhiteDNS/StormDNS — WhiteDNS does NOT support the 26 steps).
#
# REQUIRED CALLER SETUP (one-time, manual):
#   1. Fork https://github.com/iampedii/WhiteDNS to your account.
#   2. Replace its `third_party/StormDNS` submodule with this webapp repo
#      (https://github.com/hamijafayi-debug/MasterDnsVPN).
#   3. Re-brand to "MasterDnsPro" (app name, package id, icon, colors).
#   4. Honour the upstream TRADEMARK.MD.
#   5. Set the repo secrets/vars listed below in THIS repo
#      (Settings → Secrets and variables → Actions).
#
# REQUIRED REPO VARIABLE:
#   ANDROID_APP_REPO    e.g. "hamijafayi-debug/MasterDnsPro-Android"
#                       (no leading https://, just owner/repo)
#
# REQUIRED REPO SECRETS (for signed release APK):
#   ANDROID_SIGNING_KEY      base64 of the .jks keystore
#   ANDROID_KEY_ALIAS        keystore alias (e.g. masterdnspro)
#   ANDROID_KEYSTORE_PASS    keystore password
#   ANDROID_KEY_PASS         key password
#
# OPTIONAL REPO VARIABLE:
#   ANDROID_APP_REF     branch / tag / commit to check out (default: main)
#
# OUTPUT ARTIFACT (downloaded by the release job in build-go.yml):
#   android-apk/MasterDnsPro_Android_Universal.apk
#
# Until the caller sets ANDROID_APP_REPO this workflow runs in "soft skip"
# mode: it logs a friendly message and exits 0 so the rest of the matrix
# stays green.
# ==============================================================================

on:
  workflow_dispatch: {}
  workflow_call:
    outputs:
      apk_built:
        description: "true if a signed APK was produced, false otherwise"
        value: ${{ jobs.build-android-apk.outputs.apk_built }}

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  APK_FINAL_NAME: "MasterDnsPro_Android_Universal.apk"

jobs:
  build-android-apk:
    name: Build signed MasterDnsPro APK
    runs-on: ubuntu-22.04
    outputs:
      apk_built: ${{ steps.finalize.outputs.apk_built }}
    steps:
      - name: Resolve Android app repo from variables
        id: resolve
        shell: bash
        run: |
          set -euo pipefail
          ANDROID_REPO="${{ vars.ANDROID_APP_REPO }}"
          ANDROID_REF="${{ vars.ANDROID_APP_REF }}"
          if [[ -z "${ANDROID_REPO}" ]]; then
            echo "::warning::ANDROID_APP_REPO repo variable is not set."
            echo "::warning::Skipping Android APK build. To enable:"
            echo "::warning::  Settings → Secrets and variables → Actions → Variables"
            echo "::warning::  → New repository variable → ANDROID_APP_REPO = owner/repo"
            echo "should_build=false" >> "$GITHUB_OUTPUT"
          else
            echo "android_repo=${ANDROID_REPO}" >> "$GITHUB_OUTPUT"
            echo "android_ref=${ANDROID_REF:-main}" >> "$GITHUB_OUTPUT"
            echo "should_build=true" >> "$GITHUB_OUTPUT"
            echo "Android app repo: ${ANDROID_REPO}@${ANDROID_REF:-main}"
          fi

      - name: Checkout Android app repo
        if: steps.resolve.outputs.should_build == 'true'
        uses: actions/checkout@v4
        with:
          repository: ${{ steps.resolve.outputs.android_repo }}
          ref: ${{ steps.resolve.outputs.android_ref }}
          submodules: recursive
          path: android-app
          fetch-depth: 1

      - name: Show Android repo layout (debug)
        if: steps.resolve.outputs.should_build == 'true'
        shell: bash
        working-directory: android-app
        run: |
          set -euo pipefail
          echo "=== Top level ==="
          ls -la
          echo
          echo "=== gradle wrappers ==="
          find . -maxdepth 3 -name 'gradlew' -print || true
          echo
          echo "=== submodules ==="
          git submodule status || true

      - name: Verify Go core submodule points at MasterDnsVPN webapp
        if: steps.resolve.outputs.should_build == 'true'
        shell: bash
        working-directory: android-app
        run: |
          set -euo pipefail
          # The Android wrapper MUST consume this repo (which has the 26 steps),
          # NOT the upstream WhiteDNS StormDNS core. Soft-warn if we cannot
          # detect it instead of hard-failing — naming may legitimately differ.
          if [[ -f .gitmodules ]]; then
            echo "=== .gitmodules ==="
            cat .gitmodules
            if grep -qiE 'masterdnsvpn|hamijafayi-debug/MasterDnsVPN' .gitmodules; then
              echo "✓ Go core submodule references the MasterDnsVPN webapp."
            else
              echo "::warning::.gitmodules does not reference MasterDnsVPN."
              echo "::warning::Make sure your fork replaces StormDNS with"
              echo "::warning::https://github.com/hamijafayi-debug/MasterDnsVPN.git"
              echo "::warning::otherwise the APK will NOT support the 26 steps."
            fi
          else
            echo "::warning::No .gitmodules found in Android repo."
          fi

      - name: Set up JDK 17 (Temurin)
        if: steps.resolve.outputs.should_build == 'true'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        if: steps.resolve.outputs.should_build == 'true'
        uses: android-actions/setup-android@v3

      - name: Set up Go 1.25 (for gomobile / Go core compile)
        if: steps.resolve.outputs.should_build == 'true'
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: false

      - name: Install Android NDK
        if: steps.resolve.outputs.should_build == 'true'
        shell: bash
        run: |
          set -euo pipefail
          sdkmanager --sdk_root="${ANDROID_SDK_ROOT}" "ndk;27.2.12479018" >/dev/null
          NDK_ROOT="${ANDROID_SDK_ROOT}/ndk/27.2.12479018"
          test -d "${NDK_ROOT}"
          echo "ANDROID_NDK_ROOT=${NDK_ROOT}" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_HOME=${NDK_ROOT}" >> "$GITHUB_ENV"

      - name: Cache Gradle
        if: steps.resolve.outputs.should_build == 'true'
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('android-app/**/*.gradle*', 'android-app/**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Make gradlew executable
        if: steps.resolve.outputs.should_build == 'true'
        shell: bash
        working-directory: android-app
        run: |
          if [[ -f gradlew ]]; then
            chmod +x gradlew
          fi

      - name: Build release APK (assembleRelease)
        if: steps.resolve.outputs.should_build == 'true'
        shell: bash
        working-directory: android-app
        env:
          ORG_GRADLE_PROJECT_appVersionName: ${{ github.run_number }}
          # Pass through standard Android NDK env so any embedded gomobile
          # build inside the Android Gradle plugin can find it.
          ANDROID_NDK_ROOT: ${{ env.ANDROID_NDK_ROOT }}
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_HOME }}
        run: |
          set -euo pipefail
          if [[ ! -f gradlew ]]; then
            echo "::error::gradlew not found in Android repo root."
            echo "::error::Make sure the fork includes the Gradle wrapper."
            exit 1
          fi
          ./gradlew --no-daemon --stacktrace assembleRelease

      - name: Locate produced APK
        if: steps.resolve.outputs.should_build == 'true'
        id: locate
        shell: bash
        working-directory: android-app
        run: |
          set -euo pipefail
          # Pick the largest .apk under build/outputs (release variant tends
          # to be the universal one when splits are off).
          mapfile -t apks < <(find . -path '*/build/outputs/apk/*release*.apk' -type f -print | sort)
          if [[ ${#apks[@]} -eq 0 ]]; then
            echo "::error::No release APK found under build/outputs/apk/."
            find . -name '*.apk' -print || true
            exit 1
          fi
          echo "Candidate APKs:"
          for a in "${apks[@]}"; do echo "  - $a ($(stat -c%s "$a") bytes)"; done
          # Prefer an unsigned one if present (so we sign it ourselves),
          # otherwise take the first.
          chosen=""
          for a in "${apks[@]}"; do
            if [[ "$a" == *"unsigned"* ]]; then chosen="$a"; break; fi
          done
          if [[ -z "$chosen" ]]; then chosen="${apks[0]}"; fi
          echo "Chosen APK: $chosen"
          # Emit a workspace-relative path (no android-app/ prefix) so the
          # next step can compose paths cleanly.
          echo "apk_relpath=${chosen#./}" >> "$GITHUB_OUTPUT"
          echo "apk_path=android-app/${chosen#./}" >> "$GITHUB_OUTPUT"

      - name: Detect signing-secret presence
        if: steps.resolve.outputs.should_build == 'true'
        id: detect_secrets
        shell: bash
        run: |
          set -euo pipefail
          if [[ -n "${{ secrets.ANDROID_SIGNING_KEY }}" \
             && -n "${{ secrets.ANDROID_KEY_ALIAS }}" \
             && -n "${{ secrets.ANDROID_KEYSTORE_PASS }}" \
             && -n "${{ secrets.ANDROID_KEY_PASS }}" ]]; then
            echo "has_signing=true" >> "$GITHUB_OUTPUT"
            echo "✓ All 4 signing secrets present, will sign APK."
          else
            echo "::warning::One or more Android signing secrets are missing."
            echo "::warning::APK will be uploaded UNSIGNED. To produce a"
            echo "::warning::signed release APK, set: ANDROID_SIGNING_KEY,"
            echo "::warning::ANDROID_KEY_ALIAS, ANDROID_KEYSTORE_PASS,"
            echo "::warning::ANDROID_KEY_PASS in repository secrets."
            echo "has_signing=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Sign release APK
        if: steps.resolve.outputs.should_build == 'true' && steps.detect_secrets.outputs.has_signing == 'true'
        id: sign
        uses: r0adkll/sign-android-release@v1
        env:
          BUILD_TOOLS_VERSION: "34.0.0"
        with:
          releaseDirectory: ${{ steps.locate.outputs.apk_path && format('android-app/{0}', steps.locate.outputs.apk_relpath) || 'android-app/app/build/outputs/apk/release' }}
          signingKeyBase64: ${{ secrets.ANDROID_SIGNING_KEY }}
          alias: ${{ secrets.ANDROID_KEY_ALIAS }}
          keyStorePassword: ${{ secrets.ANDROID_KEYSTORE_PASS }}
          keyPassword: ${{ secrets.ANDROID_KEY_PASS }}

      - name: Stage final APK with canonical name
        if: steps.resolve.outputs.should_build == 'true'
        id: stage
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p android-apk-out
          # Pick whichever path is available: signed first, else the located
          # release APK from the build outputs.
          src=""
          if [[ -n "${{ steps.sign.outputs.signedReleaseFile }}" \
             && -f "${{ steps.sign.outputs.signedReleaseFile }}" ]]; then
            src="${{ steps.sign.outputs.signedReleaseFile }}"
            echo "Using signed APK: $src"
          elif [[ -f "${{ steps.locate.outputs.apk_path }}" ]]; then
            src="${{ steps.locate.outputs.apk_path }}"
            echo "::warning::Using UNSIGNED APK: $src"
          else
            echo "::error::No APK found to stage."
            exit 1
          fi
          dest="android-apk-out/${APK_FINAL_NAME}"
          cp "$src" "$dest"
          ls -la android-apk-out/
          echo "final_apk=$dest" >> "$GITHUB_OUTPUT"
          # Generate sha256 checksum next to it (mirrors what the desktop
          # release pipeline does for its zip/tar.gz artifacts).
          ( cd android-apk-out && sha256sum "${APK_FINAL_NAME}" > "${APK_FINAL_NAME}.sha256" )
          cat "android-apk-out/${APK_FINAL_NAME}.sha256"

      - name: Upload APK artifact
        if: steps.resolve.outputs.should_build == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: |
            android-apk-out/*.apk
            android-apk-out/*.sha256
          if-no-files-found: error
          retention-days: 30

      - name: Finalize
        id: finalize
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ steps.resolve.outputs.should_build }}" == "true" ]]; then
            echo "apk_built=true" >> "$GITHUB_OUTPUT"
            echo "✓ MasterDnsPro APK built and uploaded as artifact 'android-apk'."
          else
            echo "apk_built=false" >> "$GITHUB_OUTPUT"
            echo "⊘ Android APK build skipped (ANDROID_APP_REPO not configured)."
          fi
